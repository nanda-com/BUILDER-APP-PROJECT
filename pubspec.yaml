name: worker_match_app
description: "Indian Dreams – Micro-Employment Platform for instant job discovery and hiring."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # UI & Fonts
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  smooth_page_indicator: ^1.1.0

  # State Management
  provider: ^6.1.2

  # Map & Location
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^11.0.0

  # Charts
  fl_chart: ^0.68.0

  # Utilities
  url_launcher: ^6.3.0
  intl: ^0.19.0
  shared_preferences: ^2.5.4
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/